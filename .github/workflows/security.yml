name: Security
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:17 UTC — catches new CVEs published since last PR
    - cron: '17 3 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: govulncheck (stdlib + deps CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec (Go security analyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        # Excludes:
        #   internal/api/v1 — generated protobuf code
        # We fail the build on any finding so the allowlist is the only escape hatch.
        run: |
          gosec -exclude-dir=internal/api/v1 \
                -fmt=sarif -out=gosec.sarif \
                -severity=low -confidence=low \
                ./... || true
          gosec -exclude-dir=internal/api/v1 \
                -severity=low -confidence=low \
                ./...
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif

  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  osv-scanner:
    name: osv-scanner (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v2.0.0
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

  fuzz:
    name: protocol fuzzing (nightly)
    # Only run on schedule; on PRs the 60s smoke is part of test suite.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Fuzz DecodeEnvelope (30 minutes)
        run: go test ./pkg/transport/ -run='^$' -fuzz=FuzzDecodeEnvelope -fuzztime=30m
      - name: Upload corpus on crash
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ github.run_id }}
          path: pkg/transport/testdata/fuzz/

  fuzz-smoke:
    name: protocol fuzzing (PR smoke 60s)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Smoke fuzz DecodeEnvelope
        run: go test ./pkg/transport/ -run='^$' -fuzz=FuzzDecodeEnvelope -fuzztime=60s
