syntax = "proto3";
package sentinel.v1;
option go_package = "github.com/inovacc/sentinel/internal/api/v1;v1";

// PayloadService handles structured JSON request/response communication.
service PayloadService {
  // Send a structured JSON payload and receive a JSON response.
  rpc Send(PayloadRequest) returns (PayloadResponse);
  // Send a payload and receive streaming chunks (for long-running actions).
  rpc SendStream(PayloadRequest) returns (stream PayloadChunk);
}

message PayloadRequest {
  // Action identifier (e.g., "ping", "sysinfo", "env.get", "file.stat").
  string action = 1;
  // JSON-encoded payload string.
  string payload = 2;
  // Optional session ID for tracking.
  string session_id = 3;
  // Optional key-value metadata.
  map<string, string> metadata = 4;
}

message PayloadResponse {
  // Echo of the action that was processed.
  string action = 1;
  // JSON-encoded response string.
  string payload = 2;
  // Whether the action succeeded.
  bool success = 3;
  // Error message if success is false.
  string error = 4;
  // Processing duration in milliseconds.
  int64 duration_ms = 5;
}

message PayloadChunk {
  // JSON-encoded chunk of data.
  string data = 1;
  // Whether this is the last chunk.
  bool done = 2;
  // Error message if the stream encountered an error.
  string error = 3;
}
