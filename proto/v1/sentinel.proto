syntax = "proto3";
package sentinel.v1;
option go_package = "github.com/inovacc/sentinel/internal/api/v1;v1";

// ExecService handles command execution on remote machines.
service ExecService {
  // Execute a command in the sandbox and return the result.
  rpc Exec(ExecRequest) returns (ExecResponse);
  // Execute with streaming output.
  rpc ExecStream(ExecRequest) returns (stream ExecOutput);
}

// FileSystemService handles sandboxed file operations.
service FileSystemService {
  // Read a file (must be in allowlist or sandbox).
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  // Write a file (sandbox directory only).
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  // List directory contents.
  rpc ListDir(ListDirRequest) returns (ListDirResponse);
  // Upload a project to the sandbox (chunked streaming).
  rpc Upload(stream UploadChunk) returns (UploadResponse);
  // Download a file from allowlisted paths.
  rpc Download(DownloadRequest) returns (stream DownloadChunk);
  // Delete a file (sandbox directory only).
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  // Glob pattern match within allowed paths.
  rpc Glob(GlobRequest) returns (GlobResponse);
  // Search file contents within allowed paths.
  rpc Grep(GrepRequest) returns (GrepResponse);
}

// --- Exec Messages ---

message ExecRequest {
  string command = 1;
  repeated string args = 2;
  string working_dir = 3;
  map<string, string> env = 4;
  int32 timeout_seconds = 5;
  string session_id = 6;
}

message ExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  int64 duration_ms = 4;
}

message ExecOutput {
  enum Stream {
    STDOUT = 0;
    STDERR = 1;
  }
  Stream stream = 1;
  bytes data = 2;
  bool done = 3;
  int32 exit_code = 4;
}

// --- FileSystem Messages ---

message ReadFileRequest {
  string path = 1;
  int64 offset = 2;
  int64 limit = 3;
}

message ReadFileResponse {
  bytes content = 1;
  int64 size = 2;
  string mime_type = 3;
}

message WriteFileRequest {
  string path = 1;
  bytes content = 2;
  bool create_dirs = 3;
}

message WriteFileResponse {
  int64 bytes_written = 1;
}

message ListDirRequest {
  string path = 1;
  bool recursive = 2;
}

message ListDirResponse {
  repeated FileEntry entries = 1;
}

message FileEntry {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
  int64 size = 4;
  int64 modified_unix = 5;
  string mode = 6;
}

message UploadChunk {
  string target_path = 1;
  bytes data = 2;
  bool is_last = 3;
}

message UploadResponse {
  int64 total_bytes = 1;
  string path = 2;
}

message DownloadRequest {
  string path = 1;
}

message DownloadChunk {
  bytes data = 1;
  bool is_last = 2;
}

message DeleteRequest {
  string path = 1;
}

message DeleteResponse {
  bool deleted = 1;
}

message GlobRequest {
  string pattern = 1;
  string base_path = 2;
}

message GlobResponse {
  repeated string matches = 1;
}

message GrepRequest {
  string pattern = 1;
  string path = 2;
  bool recursive = 3;
  bool ignore_case = 4;
  int32 context_lines = 5;
}

message GrepResponse {
  repeated GrepMatch matches = 1;
}

message GrepMatch {
  string file = 1;
  int32 line = 2;
  string text = 3;
  repeated string context_before = 4;
  repeated string context_after = 5;
}
